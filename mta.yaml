_schema-version: "3.2"
ID: dte-monitor
version: 1.0.0
description: Monitor DTE Proveedor - Fenix Gold / Lince SA
parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm install --prefix app/monitordte --prefer-offline

# ==============================================================================
# MODULES
# ==============================================================================
modules:

  # ----------------------------------------------------------------------------
  # SAPUI5 App — ejecuta `ui5 build` y produce dist/.
  # No se despliega directamente a CF; el deployer toma su dist/ y lo sube
  # al servicio html5-apps-repo (app-host).
  # ----------------------------------------------------------------------------
  - name: dte-monitor-app
    type: html5
    path: app/monitordte
    build-parameters:
      builder: custom
      commands:
        - npm run build:cf
      build-result: ../app-content
      supported-platforms: []

  # ----------------------------------------------------------------------------
  # HTML5 Application Deployer
  # Empaqueta el contenido de dte-monitor-app/dist y lo sube al app-host.
  # Lo sirve el Managed Approuter (provisto por Build Work Zone / Launchpad).
  # ----------------------------------------------------------------------------
  - name: dte-monitor-deployer
    type: com.sap.application.content
    path: deployer
    requires:
      - name: dte-monitor-html5-repo-host
        parameters:
          content-target: true
      - name: dte-monitor-xsuaa
    build-parameters:
      build-result: resources
      requires:
        - name: dte-monitor-app
          artifacts:
            - '*'
          target-path: resources/

  # ----------------------------------------------------------------------------
  # Destination Content
  # Registra las destinations tecnicas que usa el HTML5 runtime / Work Zone
  # para descubrir y ejecutar la app desde el managed approuter.
  # El valor sap.cloud.service debe coincidir con manifest.json.
  # ----------------------------------------------------------------------------
  - name: dte-monitor-destination-content
    type: com.sap.application.content
    requires:
      - name: dte-monitor-destination-service
        parameters:
          content-target: true
      - name: dte-monitor-html5-repo-host
        parameters:
          service-key:
            name: dte-monitor-html5-repo-host-key
      - name: dte-monitor-xsuaa
        parameters:
          service-key:
            name: dte-monitor-xsuaa-key
    parameters:
      content:
        instance:
          destinations:
            - Name: dte-monitor-html5-repo-host
              ServiceInstanceName: dte-monitor-html5-repo-host
              ServiceKeyName: dte-monitor-html5-repo-host-key
              sap.cloud.service: comfenixgolddtemonitordte
            - Name: dte-monitor-xsuaa
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: dte-monitor-xsuaa
              ServiceKeyName: dte-monitor-xsuaa-key
              sap.cloud.service: comfenixgolddtemonitordte
          existing_destinations_policy: update
    build-parameters:
      no-source: true

# ==============================================================================
# RESOURCES
# ==============================================================================
resources:

  # HTML5 Apps Repository — depósito del contenido estático (HTML/JS/CSS)
  - name: dte-monitor-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
      config:
        sizeLimit: 4

  # XSUAA — autenticación OAuth2 / SAML
  - name: dte-monitor-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: xs-security.json
      config:
        xsappname: dte-monitor
        tenant-mode: dedicated

  # Destination Service — conectividad hacia S/4HANA Public Edition.
  - name: dte-monitor-destination-service
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
